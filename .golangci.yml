version: "2"

linters:
  default: standard
  enable:
    - misspell
    - revive
    - bodyclose
    - errorlint
    - gocritic

  settings:
    revive:
      rules:
        - name: exported
          severity: warning
        - name: var-naming
          severity: warning

formatters:
  enable:
    - gofmt

run:
  timeout: 5m
